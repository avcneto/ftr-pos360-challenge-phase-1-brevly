services:
  postgres:
    image: postgres:18.3
    container_name: brevly-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user_links}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password_links}
      POSTGRES_DB: ${POSTGRES_DB:-link}
    volumes:
      - ./docker:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user_links} -d ${POSTGRES_DB:-link}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brevly-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: brevly-backend
    ports:
      - "3333:3333"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-user_links}:${POSTGRES_PASSWORD:-password_links}@postgres:5432/${POSTGRES_DB:-link}
      PORT: 3333
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src
    networks:
      - brevly-network
    restart: unless-stopped

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: brevly-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3333
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./web/src:/app/src
    networks:
      - brevly-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  brevly-network:
    driver: bridge
